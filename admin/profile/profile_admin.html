<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ระบบจองห้องสมุด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body>
    <div class="bg-gray-50 fixed w-full z-50">
        <div class="flex shadow p-2 justify-between h-20">
            <div class="flex gap-1">
                <h1 class="flex justify-center items-center ml-7">
                    <img src="../../img/Gemini_Generated_Image_hs4eeths4eeths4e-removebg-preview.png" alt="" class="w-20 m-0 ">
                </h1>
                <div>
                    <h1 class=" text-2xl font-bold">
                        ระบบจองห้องสมุด
                    </h1>
                    <h1>
                        มหาวิทยาลัยพะเยา
                    </h1>
                </div>
            </div>
            <div class="flex justify-center h-full ">
                <a href="../index/home_page_admin.html" class="flex bg-gray-50 text-black pl-6 pr-6 m-2 items-center rounded-xl hover:bg-gray-200"><i class="bx bx-home mr-2 text-xl"></i>ห้องทั้งหมด</a>
                <a href="/admin/history/history_room_admin.html" class="flex bg- text-black pl-6 pr-6 m-2 items-center rounded-xl hover:bg-gray-200"><i class="bx bx-calendar mr-1 text-xl"></i>การจองของฉัน</a>
                <a href="../dashbord/dashbord.html" class="flex bg- text-black pl-6 pr-6 m-2 items-center rounded-xl hover:bg-gray-200"><i class="bx bx-bar-chart-big mr-2 text-xl"></i>dashbord</a>
                <a href="../edit/edit.html" class="flex bg- text-black pl-6 pr-6 m-2 items-center rounded-xl hover:bg-gray-200"><i class="bx bx-edit-alt mr-2 text-xl"></i>แก้ไขห้อง</a>
            </div>
            <div class="flex justify-center items-center m-4">
                <a href="#" class="flex border rounded-xl  hover:bg-gray-200 bg-gray-200">
                    <span class="flex items-center mr-3">
                        <i class="bx bx-user m-1 text-xl p-1"></i>Admin
                    </span>
                </a>
            </div>
        </div>
    </div>

    <div class="h-64 bg-gradient-to-r from-purple-700 to-indigo-800 pt-20"></div>

    <div class="max-w-4xl mx-auto -mt-32 px-4 pb-12 relative z-10">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <div class="p-8 sm:flex items-center justify-between border-b bg-white">
                <div class="flex items-center gap-6">
                    <div class="w-28 h-28 bg-amber-400 rounded-2xl flex items-center justify-center text-white shadow-inner transform -rotate-3 hover:rotate-0 transition duration-300">
                        <i class="bx bx-user text-6xl"></i>
                    </div>
                    <div>
                        <h1 id="Name_account" class="text-3xl font-bold text-gray-800">Juddd Jann (Admin)</h1>
                        <p id="Email_name" class="text-gray-500"><i class="bx bx-envelope mr-1"></i>Jann@gmail.com</p>
                    </div>
                </div>
                <div class="mt-6 sm:mt-0 flex flex-col items-end gap-3">
                    <button id="logout-btn" class="text-gray-400 hover:text-red-500 transition text-sm flex items-center gap-1 mt-2 font-medium">
                        <i class="bx bx-log-out text-lg"></i> ออกจากระบบ
                    </button>
                </div>
            </div>

            <div class="p-8 bg-gray-50/50">
                <h2 class="text-lg font-semibold text-gray-700 mb-6 flex items-center">
                    <i class="bx bx-info-circle mr-2 text-purple-600"></i> ข้อมูลส่วนตัวเจ้าหน้าที่
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-500 ml-1 italic">ชื่อ-นามสกุล</label>
                        <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 text-gray-700 shadow-sm flex items-center gap-3">
                            <i class="bx bx-id-card text-purple-400"></i>
                            <span>Juddd Jann</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-500 ml-1 italic">แผนก / ตำแหน่ง</label>
                        <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 text-gray-700 shadow-sm flex items-center gap-3 italic">
                            <span>เจ้าหน้าที่ดูแลห้องสมุด</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // ดึงข้อมูลที่บันทึกไว้ตอน Login
            const userEmail = localStorage.getItem('loggedInEmail');
            const userName = localStorage.getItem('loggedInName');

            // ถ้ามีข้อมูลอยู่ ให้ทำการเปลี่ยนข้อความบนหน้าจอ
            if (userEmail && userName) {
                document.getElementById('Name_account').innerText = userName + " (Admin)";
                document.getElementById('Email_name').innerHTML = `<i class="bx bx-envelope mr-1"></i>${userEmail}`;
                
                const infoSpans = document.querySelectorAll('.grid .bg-white span');
                if(infoSpans.length > 0) {
                    infoSpans[0].innerText = userName; 
                }
            }
        };

        // โค้ดสำหรับการกดปุ่มออกจากระบบ
        document.getElementById('logout-btn').addEventListener('click', function() {
            if(confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                // ลบข้อมูลที่จำไว้
                localStorage.removeItem('loggedInEmail');
                localStorage.removeItem('loggedInName');
                
                // ลิ้งก์กลับหน้า Login
                window.location.href = '../../login/login.html';
            }
        });
    </script>
</body>
</html>
